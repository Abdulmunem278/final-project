<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming World</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
</head>
<body>
    <div class="navbar">
        <img src="logo.png">
        <h1>Gaming World</h1>

        <a href="about.html">About</a>

        <p>Discover Amazing Games and have fun with friends.</p>
        <button>Start Playing</button>

        <img src="hero.png" alt="">

        <div class="card">
            <img src="minecraft.webp">
            <h2>Minecraft</h2>
            <p>Build and explore your own world</p>

        </div>

        <div class="card">
            <img src="fifa.jpg">
            <h2>Fifa</h2>
            <p>Enjoy Exciting Football Matches</p>
            <button>Play</button>
        </div>

        <div class="card">
            <img src="roblox.png">
            <h2>Roblox</h2>
            <p>create and play games with your friends</p>
            <button>Play</button>
        </div>

<div class="footer">
    <p>Gaming World 2026</p>
</div>
